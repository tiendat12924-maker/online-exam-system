<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Hồ sơ cá nhân - THPT Online Exam</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-700: #334155;
            --slate-900: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--slate-50);
            color: var(--slate-900);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling */
        .header {
            height: 70px;
            background: #ffffff;
            border-bottom: 1px solid var(--slate-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo img {
            height: 32px;
            cursor: pointer;
        }

        .btn-home {
            height: 40px;
            padding: 0 16px;
            border-radius: 10px;
            border: 1px solid var(--slate-200);
            background: #ffffff;
            color: var(--slate-700);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-home:hover {
            background: var(--slate-100);
            border-color: #cbd5e1;
        }

        /* Container & Main Layout */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 24px;
            width: 100%;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .profile-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 32px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Profile Card */
        .profile-card {
            background: #ffffff;
            border: 1px solid var(--slate-200);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .avatar-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2);
            text-transform: uppercase;
        }

        .user-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--slate-900);
            margin: 0 0 6px 0;
        }

        .user-email {
            font-size: 14px;
            color: #64748b;
            margin: 0 0 24px 0;
            word-break: break-all;
        }

        .divider {
            height: 1px;
            background: var(--slate-200);
            margin: 24px 0;
        }

        .btn-logout {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            background: #fff5f5;
            color: var(--danger);
            border: 1px solid #fee2e2;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #fee2e2;
            border-color: #fca5a5;
        }

        /* History Card */
        .history-card {
            background: #ffffff;
            border: 1px solid var(--slate-200);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            min-height: 400px;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .history-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--slate-900);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-title i {
            color: var(--primary);
        }

        .badge-count {
            background: var(--slate-100);
            color: var(--slate-700);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Table Design */
        .table-responsive {
            overflow-x: auto;
            border: 1px solid var(--slate-200);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: var(--slate-50);
            padding: 16px;
            font-weight: 600;
            color: #64748b;
            border-bottom: 1px solid var(--slate-200);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--slate-200);
            color: var(--slate-700);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .test-title {
            font-weight: 600;
            color: var(--slate-900);
        }

        .score-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
        }

        .score-high {
            background: #ecfdf5;
            color: #065f46;
        }

        .score-medium {
            background: #fffbeb;
            color: #92400e;
        }

        .score-low {
            background: #fff1f2;
            color: #9f1239;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-view {
            background: #eff6ff;
            color: var(--primary);
            border: 1px solid #bfdbfe;
        }

        .btn-view:hover {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        .btn-retake {
            background: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
        }

        .btn-retake:hover {
            background: var(--success);
            color: #ffffff;
            border-color: var(--success);
        }

        .empty-state {
            text-align: center;
            padding: 64px 24px;
        }

        .empty-state i {
            font-size: 48px;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .empty-state p {
            margin: 0;
            font-size: 15px;
            color: #64748b;
        }

        .empty-state .btn-start {
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 40px;
            padding: 0 20px;
            border-radius: 10px;
            background: var(--primary);
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        .empty-state .btn-start:hover {
            background: var(--primary-hover);
        }

        /* Footer Styling */
        .footer {
            height: 60px;
            background: #ffffff;
            border-top: 1px solid var(--slate-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #64748b;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button class="btn-home" onclick="location.href='/index'">
                <i class="fa-solid fa-house"></i> Trang chủ
            </button>
            <div class="logo" onclick="location.href='/index'"><img src="images/logo3.png" alt="Logo"></div>
        </div>
    </div>

    <div class="container">
        <div class="profile-layout">
            <!-- Left Panel: User Profile Card -->
            <div class="profile-card">
                <div class="avatar-container" th:text="${#strings.substring(user.fullName, 0, 1)}">U</div>
                <h2 class="user-name" th:text="${user.fullName}">Tên Người Dùng</h2>
                <p class="user-email" th:text="${user.email}">user@example.com</p>
                <div class="divider"></div>
                <button class="btn-logout" onclick="handleLogout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                </button>
            </div>

            <!-- Right Panel: History of Attempts -->
            <div class="history-card">
                <div class="history-header">
                    <h3 class="history-title">
                        <i class="fa-solid fa-clock-rotate-left"></i> Lịch sử làm bài
                        <span class="badge-count" th:text="${attempts.size()} + ' lượt làm'">0 lượt làm</span>
                    </h3>
                </div>

                <div class="empty-state" th:if="${attempts == null || attempts.isEmpty()}">
                    <i class="fa-solid fa-clipboard-question"></i>
                    <p>Bạn chưa làm bài thi nào.</p>
                    <a href="/index" class="btn-start">
                        Luyện tập ngay <i class="fa-solid fa-arrow-right"></i>
                    </a>
                </div>

                <div class="table-responsive" th:if="${attempts != null && !attempts.isEmpty()}">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;">STT</th>
                                <th>Đề thi</th>
                                <th style="width: 150px;">Thời gian làm bài</th>
                                <th style="width: 180px;">Thời điểm nộp</th>
                                <th style="width: 120px;">Số câu đúng</th>
                                <th style="width: 80px; text-align: center;">Điểm</th>
                                <th style="width: 220px; text-align: center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="attempt, stat : ${attempts}">
                                <td th:text="${stat.count}">1</td>
                                <td>
                                    <div class="test-title" th:text="${attempt.test != null ? attempt.test.title : 'Đề thi đã bị xóa'}">Đề thi số 1</div>
                                </td>
                                <td>
                                    <span th:text="${attempt.timeSpent != null ? (attempt.timeSpent / 60) + ' phút ' + (attempt.timeSpent % 60) + ' giây' : 'Chưa ghi nhận'}">15 phút 20 giây</span>
                                </td>
                                <td>
                                    <span th:text="${attempt.submittedAt != null ? #temporals.format(attempt.submittedAt, 'dd/MM/yyyy HH:mm') : 'N/A'}">20/07/2026 14:35</span>
                                </td>
                                <td>
                                    <span th:text="${attempt.correctCount} + '/' + ${attempt.test != null ? attempt.test.questions.size() : 'N/A'}">32/40</span>
                                </td>
                                <td style="text-align: center;">
                                    <span class="score-badge"
                                          th:classappend="${attempt.score >= 8.0} ? 'score-high' : (${attempt.score >= 5.0} ? 'score-medium' : 'score-low')"
                                          th:text="${#numbers.formatDecimal(attempt.score, 1, 1)}">8.5</span>
                                </td>
                                <td style="text-align: center;">
                                    <div style="display: flex; gap: 8px; justify-content: center;">
                                        <a th:href="@{/attempt/{id}/review(id=${attempt.id})}" class="btn-action btn-view" title="Xem chi tiết bài làm">
                                            <i class="fa-solid fa-eye"></i> Xem lại
                                        </a>
                                        <a th:href="@{/chitietde/{id}(id=${attempt.test.id})}" class="btn-action btn-retake" title="Làm lại đề thi này">
                                            <i class="fa-solid fa-rotate-right"></i> Làm lại
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 DOV THPT. Cung cấp bởi DOL ENGLISH.
    </div>

    <script>
        function handleLogout() {
            const ok = confirm("Bạn có chắc chắn muốn đăng xuất?");
            if (ok) {
                window.location.href = "/logout";
            }
        }
    </script>
</body>
</html>
